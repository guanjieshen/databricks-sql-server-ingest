bundle:
  name: sql-server-ct

variables:
  workspace_root:
    description: Workspace path where the repo lives (e.g. Repos path or bundle sync destination). Used by jobs and pipeline for scripts and config paths.
    default: ""
  catalog:
    description: Unity Catalog name for DLT pipelines.
    default: guanjiemar1
  manifest_file:
    description: Manifest filename used by DLT pipeline configuration.
    default: incremental_output.yaml

targets:
  dev:
    mode: development
    variables:
      workspace_root: ""
  prod:
    mode: production
    variables:
      workspace_root: ""

include:
  - resources/pipelines/*.yml
  - resources/jobs/*.yml
