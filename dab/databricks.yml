bundle:
  name: sql-server-ct

variables:
  workspace_root:
    description: Workspace path where the full repo lives (e.g. /Workspace/Repos/<folder>/<repo>). Jobs and pipelines use this to resolve scripts, configs, and pipeline code outside the bundle root.
    default: ""
  catalog:
    description: Unity Catalog name for DLT pipelines.
    default: guanjiemar1
  manifest_file:
    description: Manifest filename used by DLT pipeline configuration.
    default: incremental_output.yaml

targets:
  dev:
    mode: development
  prod:
    mode: production

include:
  - resources/pipelines/*.yml
  - resources/jobs/*.yml
