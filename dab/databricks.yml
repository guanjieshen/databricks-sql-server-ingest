bundle:
  name: sql-server-ct

variables:
  catalog:
    description: Unity Catalog name for DLT pipelines.
    default: guanjiemar1
  manifest_file:
    description: Manifest filename used by DLT pipeline configuration.
    default: incremental_output.yaml

targets:
  dev:
    mode: development
  prod:
    mode: production

include:
  - resources/pipelines/*.yml
  - resources/jobs/*.yml
