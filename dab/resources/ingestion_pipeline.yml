# Shared DLT ingestion pipeline consumed by all SQL Server CT jobs (1:1 jobs reference this pipeline).
# Paths use ${var.workspace_root}; set workspace_root in targets or via --var when deploying.

resources:
  pipelines:
    ingestion_pipeline:
      name: ingestion_pipeline
      configuration:
        input_yaml: ${var.workspace_root}/pipelines/pipeline_1.yaml
        manifest_file: incremental_output.yaml
      libraries:
        - glob:
            include: ${var.workspace_root}/ingestion_pipeline/ingestion_pipeline_materialized.py
        - glob:
            include: ${var.workspace_root}/ingestion_pipeline/metadata_helper.py
      schema: default
      photon: true
      catalog: guanjiemar1
      serverless: true
      root_path: ${var.workspace_root}/ingestion_pipeline
