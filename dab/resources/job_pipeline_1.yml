# Job for pipelines/pipeline_1.yaml (1:1 mapping).
# References shared ingestion pipeline via ${resources.pipelines.ingestion_pipeline.id}.
# Generated by dab/generate_jobs.py — do not edit by hand.

resources:
  jobs:
    sql_server_ct_pipeline_1:
      name: SQL Server CT – pipeline_1
      tasks:
      - task_key: gateway
        spark_python_task:
          python_file: ${var.workspace_root}/scripts/sync.py
          parameters:
          - ${var.workspace_root}/pipelines/pipeline_1.yaml
        environment_key: Task_environment
      - task_key: check_record_changed
        depends_on:
        - task_key: gateway
        condition_task:
          op: GREATER_THAN
          left: '{{tasks.gateway.values.total_rows_changed}}'
          right: '0'
      - task_key: schema_change_detected
        depends_on:
        - task_key: gateway
        condition_task:
          op: EQUAL_TO
          left: '{{tasks.gateway.values.schema_changes_detected}}'
          right: 'true'
      - task_key: ingestion
        depends_on:
        - task_key: check_record_changed
          outcome: 'true'
        pipeline_task:
          pipeline_id: ${resources.pipelines.ingestion_pipeline.id}
      queue:
        enabled: true
      environments:
      - environment_key: Task_environment
        spec:
          dependencies:
          - mssql-python
          environment_version: '4'
      performance_target: PERFORMANCE_OPTIMIZED
